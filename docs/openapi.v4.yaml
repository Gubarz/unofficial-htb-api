  /pwnbox/terminate:
    post:
      description: Terminate a Pwnbox instance.
      operationId: postPwnboxTerminate
      responses:
        '204':
          $ref: '#/components/responses/PwnboxTerminate204'
        '400':
          $ref: '#/components/responses/GenericError'
      summary: Stop Pwnbox
