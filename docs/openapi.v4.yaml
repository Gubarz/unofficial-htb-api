components:
  securitySchemes:
    bearer:
      description: Need to create token on app.hackthebox.com
      scheme: bearer
      type: http
  parameters:
    VpnId:
      description: ID of the vpn server
      in: path
      name: vpnId
      required: true
      schema:
        type: integer
    ChallengeId:
      description: ID of the product
      in: path
      name: challengeId
      required: true
      schema:
        type: integer
    ChallengeSlug:
      description: ID or Name of the product
      in: path
      name: challengeSlug
      required: true
      schema:
        type: string
    Page:
      description: Page number
      in: query
      name: page
      required: false
      schema:
        type: integer
    PerPage:
      description: Limit results per page
      in: query
      name: per_page
      required: false
      schema:
        maximum: 100
        minimum: 5
        type: integer
    Status:
      description: Omit for both
      in: query
      name: status
      required: false
      schema:
        enum:
          - incompleted
          - complete
        type: string
    State:
      description: Filter by state. You can provide multiple values. For example, state=active&state=retired.
      explode: true
      in: query
      name: state
      schema:
        items:
          enum:
            - active
            - retired
            - unreleased
          type: string
        type: array
      style: form
    SortBy:
      description: Field to sort by
      in: query
      name: sort_by
      required: false
      schema:
        enum:
          - release-date
          - name
          - user-owns
          - system-owns
          - rating
          - user-difficulty
        type: string
    SortType:
      description: Sort type (asc or desc)
      in: query
      name: sort_type
      required: false
      schema:
        enum:
          - asc
          - desc
        type: string
    Difficulty:
      description: Filter by difficulty level
      explode: true
      in: query
      name: difficulty[]
      required: false
      schema:
        items:
          enum:
            - very-easy
            - easy
            - medium
            - hard
            - insane
          type: string
        type: array
      style: form
    Keyword:
      description: Search String
      in: query
      name: keyword
      required: false
      schema:
        example: hack
        type: string
    Category:
      description: |
        Filter by category. You can provide multiple values. For example,
        category[]=15&category[]=20. See /v4/{productName}/categories/list for full list
      explode: true
      in: query
      name: category[]
      schema:
        items:
          type: integer
        type: array
      style: form
    Todo:
      description: Filter ToDo
      in: query
      name: todo
      required: false
      schema:
        enum:
          - 1
        format: int
        type: integer
    Product:
      description: Select vpn server
      in: query
      name: product
      required: true
      schema:
        enum:
          - competitive
          - labs
          - starting_point
          - fortresses
        type: string
    ProlabId:
      description: ID of the product
      in: path
      name: prolabId
      required: true
      schema:
        type: integer
    FortressId:
      description: ID of the product
      in: path
      name: fortressId
      required: true
      schema:
        type: integer
    MachineId:
      description: ID of the product
      in: path
      name: machineId
      required: true
      schema:
        type: integer
    MachineSlug:
      description: Can be the ID or Name of a box
      in: path
      name: machineSlug
      required: true
      schema:
        type: string
    ProductId:
      description: ID of the product
      in: path
      name: productId
      required: true
      schema:
        type: integer
    ProductPath:
      description: Product Name
      in: path
      name: product
      required: true
      schema:
        enum:
          - machine
          - challenge
          - sherlock
        type: string
    Query:
      description: Search String
      in: query
      name: query
      required: true
      schema:
        example: hack
        type: string
    SearchTags:
      description: Search Term
      in: query
      name: tags
      required: false
      schema:
        items:
          enum:
            - machines
            - challenges
            - users
            - teams
          type: string
        maxItems: 1
        minItems: 1
        type: array
    SeasonId:
      description: ID of the Season
      in: path
      name: seasonId
      required: true
      schema:
        type: integer
    UserId:
      description: ID of the user
      in: path
      name: userId
      required: true
      schema:
        type: integer
    Leaderboard:
      description: players or teams
      in: path
      name: leaderboard
      required: true
      schema:
        enum:
          - players
          - teams
        type: string
    PeriodQuery:
      description: One of ["1Y", "6M", "3M", "1M", "1W"]
      in: query
      name: period
      required: true
      schema:
        default: 1W
        enum:
          - 1Y
          - 6M
          - 3M
          - 1M
          - 1W
        type: string
    SherlockSortBy:
      description: Attribute to sort by
      in: query
      name: sort_by
      schema:
        enum:
          - solves
          - category
          - rating
          - name
        type: string
    SherlockId:
      description: ID of the Sherlock
      in: path
      name: sherlockId
      required: true
      schema:
        type: integer
    TaskId:
      description: ID of the task
      in: path
      name: taskId
      required: true
      schema:
        type: integer
    SherlockSlug:
      description: ID or Name of the Sherlock
      in: path
      name: sherlockSlug
      required: true
      schema:
        type: string
    TeamId:
      description: ID of the team
      in: path
      name: teamId
      required: true
      schema:
        type: integer
    NPastDays:
      description: number of past days, max 90
      in: query
      name: n_past_days
      required: false
      schema:
        type: integer
    RequestId:
      description: Request ID
      in: path
      name: requestId
      required: true
      schema:
        type: integer
    UniversityId:
      description: ID of the Univeritiy
      in: path
      name: universityId
      required: true
      schema:
        type: integer
    Search:
      description: Search
      in: query
      name: search
      required: false
      schema:
        type: string
    Rare:
      description: Number of rare badges to retrieve
      in: query
      name: rare
      required: false
      schema:
        maximum: 20
        minimum: 1
        type: integer
    PeriodPath:
      description: One of ["1Y", "6M", "3M", "1M", "1W"]
      in: path
      name: period
      required: true
      schema:
        enum:
          - 1Y
          - 6M
          - 3M
          - 1M
          - 1W
        type: string
  headers:
    XRateLimitHeader:
      description: Total requests allowed
      schema:
        example: 15
        format: int
        type: integer
    XRateLimitRemainingHeader:
      description: Remaining requests allowed
      schema:
        example: 14
        format: int
        type: integer
